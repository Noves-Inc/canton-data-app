apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-app-db-pvc
  namespace: validator  # UPDATE with your namespace
spec:
  accessModes:
    - ReadWriteOnce
  # ENCRYPTION AT REST (v4): set this to a StorageClass that provisions ENCRYPTED
  # volumes in your cluster (examples for AWS/Azure/GCP/on-prem, plus how to migrate
  # an existing unencrypted PVC, are in ../../encryption_at_rest.md).
  # If your cluster's DEFAULT StorageClass is already encrypted, you may delete this
  # line — but verify that first; omitting it on an unencrypted default silently
  # stores the ledger index in plaintext.
  # Uncomment and replace with an existing encrypted StorageClass. Leaving this commented uses
  # the cluster default, which is acceptable only after you verify that default is encrypted.
  # storageClassName: encrypted-cmk
  resources:
    requests:
      storage: 100Gi  # Postgres data storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: canton-data-app-exports
  namespace: validator  # UPDATE with your namespace
spec:
  # ReadWriteOnce matches the supported single backend replica. Use RWX only if a future
  # multi-replica deployment requires shared filesystem artifact access.
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 200Gi  # Size for peak export volume across the 60-day retention window.
