services:
  canton-data-app-frontend:
    image: ghcr.io/noves-inc/canton-translate-ui:latest
    container_name: canton-data-app-frontend
    ports:
      - "8091:8091"
    environment:
      PORT: "8091"
      # Backend endpoint (internal Docker DNS)
      CANTON_TRANSLATE_BASE_URL: "http://canton-data-app-backend:8090"

      # ===== Auth0 Configuration (Option 1) =====
      # Uncomment these to use Auth0 for authentication
      VITE_AUTH0_DOMAIN: "your-tenant.us.auth0.com"
      VITE_AUTH0_CLIENT_ID: "<SPA_CLIENT_ID>" # From Auth0 SPA app
      VITE_AUTH0_AUDIENCE: "https://canton.network.global" # Custom API identifier - REQUIRED for JWT tokens
      VITE_AUTH0_REDIRECT_URI: "https://canton-data-ui.yourdomain.com/callback"
      VITE_AUTH0_LOGOUT_URL: "https://canton-data-ui.yourdomain.com"

      # ===== Keycloak Configuration (Option 2) =====
      # Uncomment these to use Keycloak for authentication (alternative to Auth0)
      # NOTE: Presence of VITE_KEYCLOAK_URL triggers Keycloak authentication
      # VITE_KEYCLOAK_URL: "https://keycloak.yourdomain.com"  # Base URL of Keycloak server
      # VITE_KEYCLOAK_REALM: "your-realm-name"  # Keycloak realm name
      # VITE_KEYCLOAK_CLIENT_ID: "data-app-ui"  # From Keycloak Public Client
      # VITE_KEYCLOAK_REDIRECT_URI: "https://canton-data-ui.yourdomain.com/callback"
      # VITE_KEYCLOAK_LOGOUT_URL: "https://canton-data-ui.yourdomain.com"
      # IMPORTANT: Keycloak client must have 'daml_ledger_api' as a default scope

      # ===== Wallet Configuration (Optional) =====
      # VITE_WALLET_CONFIRMATION_THRESHOLD: "100000"  # CC threshold requiring "CONFIRM" for large transfers (default: 100000)
    networks:
      - splice-validator_splice_validator
    depends_on:
      canton-data-app-backend:
        condition: service_started
    restart: unless-stopped

  canton-data-app-backend:
    image: ghcr.io/noves-inc/canton-translate:latest
    container_name: canton-data-app-backend
    ports:
      - "8090:8090"
    environment:
      # Canton Ledger API connection
      # OR if using external participant:
      # CANTON_NODE_ADDR: "canton-validator.yourdomain.com:8443"
      CANTON_NODE_ADDR: "participant:5001" # Internal Docker DNS
      # CANTON_NODE_CERT_FILE_PATH: "/code/validator_certificate.crt"
      CANTON_NODE_CERT_FILE_PATH: ""
      INDEX_DB_HOST: "canton-data-app-db"
      INDEX_DB_PORT: "5432"
      INDEX_DB_NAME: "canton_index"
      INDEX_DB_USER: "appuser"
      INDEX_DB_PASSWORD: ${CANTON_TRANSLATE_DB_PASSWORD:-change-me}
      # Optional: Traffic Analysis (requires Fluent Bit addon, see traffic-analyzer/)
      # TRAFFIC_ANALYSIS_ENABLED: "true"  # Default is "false"

      # Optional: Automatic Unclassified Reporting
      # AUTOMATIC_UNCLASSIFIED_REPORTING: "true"  # Default is "false". When enabled, unclassified transactions are automatically included in reporting workflows.

      # Background M2M identity. Put M2M_CLIENT_SECRET in .env, never in this file.
      M2M_INDEXER_ENABLED: "true"
      M2M_TOKEN_ENDPOINT: "https://your-issuer.example/oauth/token"
      M2M_CLIENT_ID: "replace-with-m2m-client-id"
      M2M_CLIENT_SECRET: ${M2M_CLIENT_SECRET:?set M2M_CLIENT_SECRET in .env}
      M2M_AUDIENCE: "https://canton.network.global"

      # Validator uptime monitoring is enabled by default. Set false to disable.
      VALIDATOR_UPTIME_ENABLED: "true"
      # VALIDATOR_UPTIME_INTERVAL_SECONDS: "30"
      # VALIDATOR_UPTIME_TIMEOUT_SECONDS: "3"
      # VALIDATOR_UPTIME_RAW_RETENTION_DAYS: "35"
      # VALIDATOR_UPTIME_HOURLY_RETENTION_DAYS: "400"
      # Public index used for the on-ledger overlay and automatic validator-party discovery.
      # PUBLIC_SCAN_INDEXER_URL: "https://your-public-indexer.example"
      # The monitor reuses the backend capture identity; uptime needs no new secret.

      # Optional S3 backup configuration
      BACKUP_S3_BUCKET: ""
      BACKUP_S3_PREFIX: ""
      BACKUP_S3_ENDPOINT_URL: ""
      BACKUP_S3_ACCESS_KEY_ID: ""
      BACKUP_S3_SECRET_ACCESS_KEY: ""
      BACKUP_S3_SESSION_TOKEN: ""

      # Optional S3 configuration for asynchronous transaction, cost-basis, and rollup artifacts.
      # If left empty, exports reuse BACKUP_S3_* and then the sample's persistent /exports volume.
      # A 501 is returned only when neither S3 nor a valid /exports mount is available.
      # See readme.md -> Data Exports.
      # EXPORTS_S3_BUCKET: ""
      # EXPORTS_S3_ENDPOINT_URL: ""
      # EXPORTS_S3_ACCESS_KEY_ID: ""
      # EXPORTS_S3_SECRET_ACCESS_KEY: ""
      # Wallet features (optional - leave empty to disable wallet functionality)
      SCAN_PROXY_URL: "http://validator:5003/api/validator"
      # Nodes configuration (JSON file mount)
      NODES_CONFIG_FILE_PATH: "/app/config/nodes-config.json"
    volumes:
      - ./config/nodes-config.json:/app/config/nodes-config.json:ro
      # Filesystem export provider. S3 still wins when either bucket variable is set.
      - accounting-exports:/exports
    networks:
      - splice-validator_splice_validator
    depends_on:
      canton-data-app-db:
        condition: service_healthy
    restart: unless-stopped

  canton-data-app-db:
    image: ghcr.io/noves-inc/cda-db:v4.0.0@sha256:f1d7a1c1bee3ca64c17a59a76351a5404b975fe0463b354797309321f76440f4
    container_name: canton-data-app-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "appuser"
      POSTGRES_DB: "canton_index"
      POSTGRES_PASSWORD: ${CANTON_TRANSLATE_DB_PASSWORD:-change-me}
      PGDATA: /home/postgres/pgdata/data
    volumes:
      # Database storage. Default: the named Docker volume below (NOT encrypted at rest
      # unless /var/lib/docker sits on an encrypted disk).
      #
      # ENCRYPTION AT REST (v4): set CANTON_DATA_APP_DB_DATA in .env to an absolute
      # path on an encrypted filesystem, e.g. CANTON_DATA_APP_DB_DATA=/mnt/canton-encrypted/db
      # See encryption_at_rest.md for setup, migration of existing data, and verification.
      - ${CANTON_DATA_APP_DB_DATA:-canton-data-app-db-data}:/home/postgres/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 15s
      retries: 5
    networks:
      - splice-validator_splice_validator
    restart: unless-stopped

networks:
  splice-validator_splice_validator:
    external: true
    name: splice-validator_splice_validator

volumes:
  # Used when CANTON_DATA_APP_DB_DATA is not set. For encryption at rest, prefer a
  # bind mount onto an encrypted filesystem via CANTON_DATA_APP_DB_DATA (see
  # encryption_at_rest.md).
  canton-data-app-db-data:
    # An explicit name keeps operational copy/backup commands stable across Compose project names.
    name: canton-data-app-db-data
  accounting-exports:
